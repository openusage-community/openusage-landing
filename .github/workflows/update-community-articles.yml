name: Update community article previews

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update article previews
        run: npm run community:update

      - name: Commit generated previews
        run: |
          if git diff --quiet -- src/generated/community-article-previews.json; then
            echo "No generated preview changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/generated/community-article-previews.json
          git commit -m "chore: update community article previews"
          git push
